<a class="approval-card" [routerLink]="['/review', approval.runId]">
  <div class="row">
    <span class="type">{{ approval.approvalType }}</span>
    <app-status-badge [label]="approval.status" [tone]="approvalStatusTone(approval.status)" />
  </div>
  <p class="requested">{{ approval.createdAt }}</p>
</a>
