<a class="run-card" [routerLink]="['/runs', run.id]">
  <div class="row">
    <app-agent-badge [agentKey]="run.agentKey" />
    <app-status-badge [label]="run.status" [tone]="runStatusTone(run.status)" />
  </div>
  <p class="created">{{ run.createdAt }}</p>
</a>
