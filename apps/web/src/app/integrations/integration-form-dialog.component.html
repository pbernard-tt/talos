<h2 mat-dialog-title>New integration</h2>
<form [formGroup]="form" (ngSubmit)="save()">
  <mat-dialog-content>
    <div class="talos-field">
      <label class="talos-label" for="integration-type">Type</label>
      <input id="integration-type" class="talos-input" formControlName="type" placeholder="e.g. github, dokploy" />
    </div>
    <div class="talos-field">
      <label class="talos-label" for="integration-name">Name</label>
      <input id="integration-name" class="talos-input" formControlName="name" />
    </div>
    <div class="talos-field">
      <label class="talos-label" for="integration-secret">Secret</label>
      <input
        id="integration-secret"
        class="talos-input"
        type="password"
        formControlName="secret"
        placeholder="e.g. a GitHub PAT"
      />
    </div>
    <div class="talos-field">
      <label class="talos-label" for="integration-auth-mode">Auth mode</label>
      <input
        id="integration-auth-mode"
        class="talos-input"
        formControlName="authMode"
        placeholder="e.g. pat, deploy_key"
      />
    </div>
    <div class="talos-field">
      <label class="talos-label" for="integration-config">Config (JSON)</label>
      <textarea
        id="integration-config"
        class="talos-textarea"
        formControlName="configJson"
        rows="4"
        placeholder='{"baseUrl": "..."}'
      ></textarea>
    </div>
    @if (jsonError(); as error) {
      <p class="talos-field-error">{{ error }}</p>
    }
  </mat-dialog-content>
  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()">Cancel</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid">Create</button>
  </mat-dialog-actions>
</form>
