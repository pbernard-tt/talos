<h2 mat-dialog-title>{{ data.title }}</h2>
<mat-dialog-content>
  <p class="message">{{ data.message }}</p>
  <form [formGroup]="form">
    <div class="talos-field">
      <label class="talos-label" for="approval-notes">Notes{{ data.notesRequired ? '' : ' (optional)' }}</label>
      <textarea id="approval-notes" class="talos-textarea" formControlName="notes" rows="3"></textarea>
    </div>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-flat-button color="primary" (click)="confirm()">{{ data.confirmLabel }}</button>
</mat-dialog-actions>
