<div class="login-page">
  <div class="login-panel">
    <div class="brand">
      <img src="assets/talos-logo.png" alt="" class="logo" />
      <span class="wordmark">Talos</span>
    </div>

    <div class="card">
      <h1>Sign in to Talos</h1>
      <p class="tagline">
        Agent-agnostic development control plane. Orchestrate coding agents, review changes, and
        gate deploys from one place.
      </p>

      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="talos-field">
          <label class="talos-label" for="login-email">Email</label>
          <input
            id="login-email"
            class="talos-input"
            type="email"
            formControlName="email"
            autocomplete="username"
            placeholder="you@company.com"
          />
        </div>

        <div class="talos-field">
          <label class="talos-label" for="login-password">Password</label>
          <input
            id="login-password"
            class="talos-input"
            type="password"
            formControlName="password"
            autocomplete="current-password"
            placeholder="••••••••"
          />
        </div>

        @if (errorMessage()) {
          <p class="error">{{ errorMessage() }}</p>
        }

        <button
          mat-flat-button
          color="primary"
          type="submit"
          class="submit-button"
          [disabled]="form.invalid || submitting()"
        >
          @if (submitting()) {
            <mat-spinner diameter="18" />
          } @else {
            Sign in
          }
        </button>
      </form>
    </div>
  </div>
</div>
