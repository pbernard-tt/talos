<div class="task-card" (click)="onClick()">
  <div class="header">
    <span class="title">{{ task.title }}</span>
    <span class="priority-dot" [style.background]="priorityColorVar(task.priority)"></span>
  </div>

  <div class="footer">
    @if (task.assignedAgentKey) {
      <app-agent-badge [agentKey]="task.assignedAgentKey" />
    }
    <app-risk-badge [level]="task.riskLevel" />
  </div>
</div>
