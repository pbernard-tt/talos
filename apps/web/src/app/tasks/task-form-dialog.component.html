<h2 mat-dialog-title>New task</h2>
<form [formGroup]="form" (ngSubmit)="save()">
  <mat-dialog-content>
    <div class="talos-field">
      <label class="talos-label" for="task-project">Project</label>
      <select id="task-project" class="talos-select" formControlName="projectId">
        <option value="" disabled>Select a project</option>
        @for (project of projectStore.projects(); track project.id) {
          <option [value]="project.id">{{ project.name }}</option>
        }
      </select>
    </div>

    <div class="talos-field">
      <label class="talos-label" for="task-title">Title</label>
      <input id="task-title" class="talos-input" formControlName="title" />
    </div>

    <div class="talos-field">
      <label class="talos-label" for="task-description">Description</label>
      <textarea id="task-description" class="talos-textarea" formControlName="description" rows="3"></textarea>
    </div>

    <div class="talos-field">
      <label class="talos-label" for="task-priority">Priority</label>
      <select id="task-priority" class="talos-select" formControlName="priority">
        @for (priority of priorities; track priority) {
          <option [value]="priority">{{ priority }}</option>
        }
      </select>
    </div>

    <div class="talos-field">
      <label class="talos-label" for="task-risk">Risk level</label>
      <select id="task-risk" class="talos-select" formControlName="riskLevel">
        @for (riskLevel of riskLevels; track riskLevel) {
          <option [value]="riskLevel">{{ riskLevel }}</option>
        }
      </select>
    </div>

    <div class="talos-field">
      <label class="talos-label" for="task-agent">Agent</label>
      <select id="task-agent" class="talos-select" formControlName="assignedAgentKey">
        <option value="">Use project default</option>
        @for (agentKey of agentKeys; track agentKey) {
          <option [value]="agentKey">{{ agentKey }}</option>
        }
      </select>
    </div>

    @if (projectStore.recommendations()?.suggestedAgentKey; as suggested) {
      <p class="recommendation-hint">
        Suggested agent: <strong>{{ suggested }}</strong>
        <button mat-button type="button" (click)="applySuggestedAgent()">Use suggestion</button>
      </p>
    }
  </mat-dialog-content>
  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()">Cancel</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid">Create</button>
  </mat-dialog-actions>
</form>
