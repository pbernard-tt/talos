<h2 mat-dialog-title>New project</h2>
<form [formGroup]="form" (ngSubmit)="save()">
  <mat-dialog-content>
    <div class="talos-field">
      <label class="talos-label" for="project-name">Name</label>
      <input id="project-name" class="talos-input" formControlName="name" />
    </div>
    <div class="talos-field">
      <label class="talos-label" for="project-repo">Repository URL</label>
      <input
        id="project-repo"
        class="talos-input"
        formControlName="repoUrl"
        placeholder="git@github.com:org/repo.git"
      />
    </div>
    <div class="talos-field">
      <label class="talos-label" for="project-branch">Default branch</label>
      <input id="project-branch" class="talos-input" formControlName="defaultBranch" placeholder="main" />
    </div>
    <div class="talos-field">
      <label class="talos-label" for="project-stack">Stack type</label>
      <input id="project-stack" class="talos-input" formControlName="stackType" placeholder="spring-boot" />
    </div>
  </mat-dialog-content>
  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()">Cancel</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid">Create</button>
  </mat-dialog-actions>
</form>
