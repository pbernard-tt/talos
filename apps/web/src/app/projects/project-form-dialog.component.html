<h2 mat-dialog-title>New Project</h2>
<form [formGroup]="form" (ngSubmit)="save()">
  <mat-dialog-content>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name" />
    </mat-form-field>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Repository URL</mat-label>
      <input matInput formControlName="repoUrl" placeholder="git@github.com:org/repo.git" />
    </mat-form-field>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Default branch</mat-label>
      <input matInput formControlName="defaultBranch" placeholder="main" />
    </mat-form-field>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Stack type</mat-label>
      <input matInput formControlName="stackType" placeholder="spring-boot" />
    </mat-form-field>
  </mat-dialog-content>
  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()">Cancel</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid">Create</button>
  </mat-dialog-actions>
</form>
