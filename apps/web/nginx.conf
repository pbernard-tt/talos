server {
    listen 80;
    # IPv6 too: the image's wget healthcheck resolves localhost to ::1 first (busybox), so an
    # IPv4-only listener makes the container report unhealthy even though it serves fine.
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /assets/env-config.json {
        add_header Cache-Control "no-store";
    }
}
