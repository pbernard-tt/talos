spring:
  application:
    name: talos-api

  datasource:
    url: ${TALOS_DB_URL:jdbc:postgresql://localhost:5432/talos}
    username: ${TALOS_DB_USER:talos}
    password: ${TALOS_DB_PASSWORD:talos}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      url: ${TALOS_REDIS_URL:redis://localhost:6379}

  rabbitmq:
    addresses: ${TALOS_RABBITMQ_URL:amqp://guest:guest@localhost:5672}

  servlet:
    multipart:
      # Phase 16: POST /internal/v1/runs/{id}/artifacts multipart uploads (transcripts can run
      # into low tens of MB for long agent sessions).
      max-file-size: 64MB
      max-request-size: 64MB

management:
  endpoints:
    web:
      exposure:
        include: health
  # Both RabbitMQ (event publishing) and Redis (locks, SSE log pub/sub) became load-bearing in
  # Phase 5 -- their default health indicators are left enabled from here on.

talos:
  internal-api-token: ${TALOS_INTERNAL_API_TOKEN:}
  jwt-secret: ${TALOS_JWT_SECRET:}
  admin-email: ${TALOS_ADMIN_EMAIL:}
  admin-password: ${TALOS_ADMIN_PASSWORD:}
  secrets-key: ${TALOS_SECRETS_KEY:}
  github-webhook-secret: ${TALOS_GITHUB_WEBHOOK_SECRET:}
  policy-file: ${TALOS_POLICY_FILE:}
  cors-allowed-origins: ${TALOS_CORS_ALLOWED_ORIGINS:}
  login-rate-limit-max-attempts: ${TALOS_LOGIN_RATE_LIMIT_MAX_ATTEMPTS:10}
  login-rate-limit-window-seconds: ${TALOS_LOGIN_RATE_LIMIT_WINDOW_SECONDS:60}
  telegram-service-email: ${TALOS_TELEGRAM_SERVICE_EMAIL:}
  telegram-service-password: ${TALOS_TELEGRAM_SERVICE_PASSWORD:}
  whatsapp-service-email: ${TALOS_WHATSAPP_SERVICE_EMAIL:}
  whatsapp-service-password: ${TALOS_WHATSAPP_SERVICE_PASSWORD:}
  # Phase 16: ArtifactStore selection -- "local" (default, pre-Phase-16 behavior) or "minio".
  artifact-store-type: ${TALOS_ARTIFACT_STORE_TYPE:local}
  artifact-local-dir: ${TALOS_ARTIFACT_LOCAL_DIR:/var/talos/artifacts}
  minio-endpoint: ${TALOS_MINIO_ENDPOINT:}
  minio-access-key: ${TALOS_MINIO_ACCESS_KEY:}
  minio-secret-key: ${TALOS_MINIO_SECRET_KEY:}
  minio-bucket: ${TALOS_MINIO_BUCKET:talos-artifacts}
  # One-shot: copies every already-recorded artifact from the local volume into the
  # currently-configured MinIO store on the next boot, then leaves itself disabled again --
  # ArtifactMigrationRunner does not clear this back to false itself (Section: operator sets it,
  # confirms the log line, then unsets it -- see phase-16-report.md).
  migrate-artifacts-on-boot: ${TALOS_MIGRATE_ARTIFACTS_ON_BOOT:false}
