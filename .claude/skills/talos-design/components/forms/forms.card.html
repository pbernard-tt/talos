<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;padding:22px;background:var(--surface-app);}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Button, Input, Select } = window.TalosDesignSystem;
function Demo() {
  const [text, setText] = React.useState("");
  const [proj, setProj] = React.useState("all");
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 18, maxWidth: 420 }}>
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
        <Button variant="primary">Approve &amp; push</Button>
        <Button variant="secondary">Retry</Button>
        <Button variant="ghost">View all →</Button>
        <Button variant="danger">Reject</Button>
        <Button variant="primary" disabled>Start run</Button>
      </div>
      <Input value={text} onChange={(e) => setText(e.target.value)} placeholder="Task title" />
      <Input value="" onChange={() => {}} error="Notes are required for this decision." placeholder="Notes" />
      <Select
        value={proj}
        onChange={(e) => setProj(e.target.value)}
        options={[
          { value: "all", label: "All projects" },
          { value: "p-1", label: "Ledgerly API" },
          { value: "p-2", label: "Pulse Analytics" },
        ]}
      />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
