<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;padding:22px;background:var(--surface-app);}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Dialog, Toast, Button } = window.TalosDesignSystem;
function Demo() {
  const [open, setOpen] = React.useState(true);
  return (
    <div>
      <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 20 }}>
        <Toast message="Run queued for “Add pagination to GET /customers”." tone="purple" />
        <Toast message="Approved. Talos will push the branch and open a pull request." tone="success" />
        <Toast message="Can’t move a task from RUNNING to DONE directly." tone="error" />
      </div>
      <Button variant="secondary" onClick={() => setOpen(true)}>Reopen dialog</Button>
      <Dialog
        open={open}
        onClose={() => setOpen(false)}
        title="Approve this run?"
        consequence="Talos will commit, push the branch, and open a pull request. This cannot be undone."
      >
        <div style={{ display: "flex", justifyContent: "flex-end", gap: 8 }}>
          <Button variant="secondary" onClick={() => setOpen(false)}>Back</Button>
          <Button variant="primary" onClick={() => setOpen(false)}>Approve &amp; push</Button>
        </div>
      </Dialog>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
