<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>

<sc-if value="{{ isHigh }}" hint-placeholder-val="{{ false }}">
  <span style="display:inline-flex; align-items:center; gap:5px; padding:3px 9px; border-radius:999px; font:700 10.5px/1.5 'Inter',sans-serif; letter-spacing:.03em; background:rgba(239,68,68,0.13); color:#EF4444; border:1px solid rgba(239,68,68,0.3);">
    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
    HIGH RISK
  </span>
</sc-if>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:110,&quot;height&quot;:24},&quot;level&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;HIGH&quot;,&quot;options&quot;:[&quot;NORMAL&quot;,&quot;HIGH&quot;],&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() { return { isHigh: this.props.level === 'HIGH' }; }
}
</script>
</body>
</html>
