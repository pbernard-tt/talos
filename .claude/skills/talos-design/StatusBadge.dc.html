<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>

<span style="display:inline-flex; align-items:center; gap:6px; padding:3px 10px; border-radius:999px; font:600 11px/1.5 'Inter',sans-serif; letter-spacing:.02em; white-space:nowrap; background:{{ bg }}; color:{{ fg }}; border:1px solid {{ border }};">
  <span style="width:6px; height:6px; border-radius:50%; background:{{ fg }}; flex:none;"></span>{{ label }}
</span>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:120,&quot;height&quot;:28},&quot;label&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;COMPLETED&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;tone&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;neutral&quot;,&quot;options&quot;:[&quot;neutral&quot;,&quot;purple&quot;,&quot;success&quot;,&quot;warning&quot;,&quot;error&quot;,&quot;info&quot;],&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const tone = this.props.tone || 'neutral';
    const palette = {
      neutral:  { bg: 'rgba(160,167,181,0.12)', fg: '#A0A7B5', border: 'rgba(160,167,181,0.25)' },
      purple:   { bg: 'rgba(139,92,246,0.14)',  fg: '#A78BFA', border: 'rgba(139,92,246,0.35)' },
      success:  { bg: 'rgba(34,197,94,0.14)',   fg: '#22C55E', border: 'rgba(34,197,94,0.3)' },
      warning:  { bg: 'rgba(245,158,11,0.14)',  fg: '#F59E0B', border: 'rgba(245,158,11,0.3)' },
      error:    { bg: 'rgba(239,68,68,0.14)',   fg: '#EF4444', border: 'rgba(239,68,68,0.32)' },
      info:     { bg: 'rgba(56,189,248,0.14)',  fg: '#38BDF8', border: 'rgba(56,189,248,0.3)' }
    };
    const c = palette[tone] || palette.neutral;
    return { bg: c.bg, fg: c.fg, border: c.border, label: this.props.label ?? '' };
  }
}
</script>
</body>
</html>
