<!-- @dsCard group="Colors" viewport="700x150" subtitle="Purple accent — used sparingly" name="Accent" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:20px;background:var(--surface-app);display:flex;gap:14px;align-items:flex-start;font-family:var(--font-ui);}
.sw{width:100px;}
.chip{height:56px;border-radius:var(--r-md);margin-bottom:6px;}
.lbl{font:600 11px var(--font-mono);color:var(--text-secondary);}
.sub{font:400 10.5px var(--font-ui);color:var(--text-muted);}
</style></head>
<body>
<div class="sw"><div class="chip" style="background:var(--accent)"></div><div class="lbl">#8B5CF6</div><div class="sub">accent</div></div>
<div class="sw"><div class="chip" style="background:var(--accent-hover)"></div><div class="lbl">#7C3AED</div><div class="sub">accent-hover</div></div>
<div class="sw"><div class="chip" style="background:var(--accent-soft)"></div><div class="lbl">#A78BFA</div><div class="sub">accent-soft</div></div>
<div class="sw"><div class="chip" style="background:var(--accent-tint-strong);border:1px solid var(--accent-border)"></div><div class="lbl">tint 16%</div><div class="sub">accent-tint-strong</div></div>
<div style="max-width:220px;font:400 12px/1.6 var(--font-ui);color:var(--text-secondary);">Reserved for: selected nav, primary buttons, active-agent pulses, progress fills, focus rings. Never a full-surface background.</div>
</body></html>
