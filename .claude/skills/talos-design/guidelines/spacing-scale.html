<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:20px;background:var(--surface-app);display:flex;gap:14px;align-items:flex-end;font-family:var(--font-ui);}
.col{display:flex;flex-direction:column;align-items:center;gap:6px;}
.bar{width:22px;background:var(--accent);border-radius:3px;}
.lbl{font:600 10px var(--font-mono);color:var(--text-muted);}
</style></head>
<body>
<div class="col"><div class="bar" style="height:4px"></div><div class="lbl">4</div></div>
<div class="col"><div class="bar" style="height:8px"></div><div class="lbl">8</div></div>
<div class="col"><div class="bar" style="height:12px"></div><div class="lbl">12</div></div>
<div class="col"><div class="bar" style="height:16px"></div><div class="lbl">16</div></div>
<div class="col"><div class="bar" style="height:24px"></div><div class="lbl">24</div></div>
<div class="col"><div class="bar" style="height:32px"></div><div class="lbl">32</div></div>
<div class="col"><div class="bar" style="height:48px"></div><div class="lbl">48</div></div>
<div class="col"><div class="bar" style="height:64px"></div><div class="lbl">64</div></div>
</body></html>
