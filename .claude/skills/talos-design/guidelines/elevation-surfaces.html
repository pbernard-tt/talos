<!-- @dsCard group="Elevation" viewport="700x220" subtitle="Card, elevated card, dialog" name="Surfaces in use" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:20px;background:var(--surface-app);display:flex;gap:16px;font-family:var(--font-ui);color:var(--text-primary);}
.card{background:var(--surface-card);border:1px solid var(--border-default);border-radius:var(--r-lg);padding:16px;width:160px;font:600 12.5px var(--font-ui);}
.elevated{background:var(--surface-elevated);border:1px solid var(--border-strong);border-radius:var(--r-xl);padding:16px;width:160px;box-shadow:var(--shadow-2);font:600 12.5px var(--font-ui);}
.dialog{background:var(--surface-elevated);border:1px solid var(--border-strong);border-radius:var(--r-xl);padding:16px;width:160px;box-shadow:var(--shadow-4);font:600 12.5px var(--font-ui);}
</style></head>
<body>
<div class="card">Resting card<br><span style="font:400 11px var(--font-ui);color:var(--text-muted);">border only, no shadow</span></div>
<div class="elevated">Elevated card<br><span style="font:400 11px var(--font-ui);color:var(--text-muted);">dropdowns, notif panel</span></div>
<div class="dialog">Dialog / drawer<br><span style="font:400 11px var(--font-ui);color:var(--text-muted);">shadow-4, scrim behind</span></div>
</body></html>
