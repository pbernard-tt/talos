<!-- @dsCard group="Colors" viewport="700x170" subtitle="Graphite surfaces, bottom to top" name="Surfaces" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:20px;background:var(--surface-app);display:flex;gap:12px;font-family:var(--font-ui);}
.sw{width:110px;}
.chip{height:70px;border-radius:var(--r-md);margin-bottom:6px;border:1px solid var(--border-default);}
.lbl{font:600 11px var(--font-mono);color:var(--text-secondary);}
.sub{font:400 10.5px var(--font-ui);color:var(--text-muted);}
</style></head>
<body>
<div class="sw"><div class="chip" style="background:var(--surface-app)"></div><div class="lbl">#080A0F</div><div class="sub">page</div></div>
<div class="sw"><div class="chip" style="background:var(--surface-sunken)"></div><div class="lbl">#0C0F16</div><div class="sub">sunken</div></div>
<div class="sw"><div class="chip" style="background:var(--surface-card)"></div><div class="lbl">#11151E</div><div class="sub">card</div></div>
<div class="sw"><div class="chip" style="background:var(--surface-elevated)"></div><div class="lbl">#161B26</div><div class="sub">elevated</div></div>
<div class="sw"><div class="chip" style="background:var(--surface-hover)"></div><div class="lbl">#1A2030</div><div class="sub">hover</div></div>
</body></html>
