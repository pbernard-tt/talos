<!-- @dsCard group="Motion" viewport="700x150" subtitle="The signature signal for anything actively executing" name="Agent pulse" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:24px;background:var(--surface-app);display:flex;align-items:center;gap:16px;font-family:var(--font-ui);color:var(--text-primary);}
.dot{width:9px;height:9px;border-radius:50%;background:var(--accent);animation:talos-pulse-ring 2s infinite;}
</style></head>
<body>
<span class="dot"></span>
<div style="font:500 13px/1.5 var(--font-ui);color:var(--text-secondary);max-width:480px;">A soft purple pulse (<code style="font-family:var(--font-mono);color:var(--accent-soft);">talos-pulse-ring</code>, 2s loop) marks every actively-running agent — sidebar badge, board card, Command Center orchestration row, Run Detail header. Nothing else in the product loops.</div>
</body></html>
