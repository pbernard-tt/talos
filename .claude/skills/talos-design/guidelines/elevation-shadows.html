<!-- @dsCard group="Elevation" viewport="700x180" subtitle="Cool-tinted shadows, elevated surfaces only" name="Shadows" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:30px 20px;background:var(--surface-app);display:flex;gap:24px;font-family:var(--font-ui);}
.box{width:90px;height:60px;background:var(--surface-elevated);border-radius:var(--r-lg);}
.lbl{margin-top:10px;font:600 11px var(--font-mono);color:var(--text-muted);text-align:center;}
</style></head>
<body>
<div><div class="box" style="box-shadow:var(--shadow-1)"></div><div class="lbl">shadow-1</div></div>
<div><div class="box" style="box-shadow:var(--shadow-2)"></div><div class="lbl">shadow-2</div></div>
<div><div class="box" style="box-shadow:var(--shadow-3)"></div><div class="lbl">shadow-3</div></div>
<div><div class="box" style="box-shadow:var(--shadow-4)"></div><div class="lbl">shadow-4</div></div>
<div><div class="box" style="box-shadow:var(--shadow-spark)"></div><div class="lbl">shadow-spark</div></div>
</body></html>
