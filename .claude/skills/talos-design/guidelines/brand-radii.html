<!-- @dsCard group="Brand" viewport="700x160" subtitle="Corner radius scale" name="Radii" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:24px;background:var(--surface-app);display:flex;gap:16px;align-items:flex-end;font-family:var(--font-ui);}
.box{width:70px;height:70px;background:var(--surface-elevated);border:1px solid var(--border-strong);}
.lbl{margin-top:8px;font:600 10.5px var(--font-mono);color:var(--text-muted);text-align:center;}
</style></head>
<body>
<div><div class="box" style="border-radius:var(--r-xs)"></div><div class="lbl">r-xs 5</div></div>
<div><div class="box" style="border-radius:var(--r-sm)"></div><div class="lbl">r-sm 8</div></div>
<div><div class="box" style="border-radius:var(--r-md)"></div><div class="lbl">r-md 10</div></div>
<div><div class="box" style="border-radius:var(--r-lg)"></div><div class="lbl">r-lg 12</div></div>
<div><div class="box" style="border-radius:var(--r-xl)"></div><div class="lbl">r-xl 14</div></div>
<div><div class="box" style="border-radius:var(--r-pill);width:110px;"></div><div class="lbl">r-pill</div></div>
</body></html>
