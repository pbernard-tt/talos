<!-- @dsCard group="Colors" viewport="700x150" subtitle="Success / warning / error / info" name="Semantic" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:20px;background:var(--surface-app);display:flex;gap:14px;font-family:var(--font-ui);}
.sw{width:100px;}
.chip{height:56px;border-radius:var(--r-md);margin-bottom:6px;}
.lbl{font:600 11px var(--font-mono);color:var(--text-secondary);}
.sub{font:400 10.5px var(--font-ui);color:var(--text-muted);}
</style></head>
<body>
<div class="sw"><div class="chip" style="background:var(--status-success)"></div><div class="lbl">#22C55E</div><div class="sub">success</div></div>
<div class="sw"><div class="chip" style="background:var(--status-warning)"></div><div class="lbl">#F59E0B</div><div class="sub">warning</div></div>
<div class="sw"><div class="chip" style="background:var(--status-error)"></div><div class="lbl">#EF4444</div><div class="sub">error</div></div>
<div class="sw"><div class="chip" style="background:var(--status-info)"></div><div class="lbl">#38BDF8</div><div class="sub">info</div></div>
</body></html>
