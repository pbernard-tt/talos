# Production reference composition for Dokploy's "Compose" application type (Section 18 of the
# implementation plan). Import this file as a Dokploy Compose app, then set the ${VAR} placeholders
# below as environment variables on that app -- Dokploy substitutes them at deploy time. Every
# variable here is documented in Appendix A of docs/Talos_Implementation_Plan.pdf; nothing here
# should ever be a real secret value.
#
# This file assumes Dokploy is building each service from this repository (build.context is
# relative to the repo root, matching how each apps/*/Dockerfile documents its own build
# invocation) -- point the Dokploy app's git source at this repo and its build context/dockerfile
# path per service below.
#
# Deploy order (Section 18): postgres -> rabbitmq/redis -> api (runs Flyway migrations on boot) ->
# orchestrator/runner-supervisor -> web. Dokploy deploys each app independently; bring dependencies
# up first the first time, then each app's own Dokploy "Deploy" trigger (what DeployService calls)
# handles redeploys thereafter.

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: talos
      POSTGRES_USER: talos
      POSTGRES_PASSWORD: ${TALOS_DB_PASSWORD}
    volumes:
      - talos_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talos -d talos"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:4.1-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: talos
      RABBITMQ_DEFAULT_PASS: ${TALOS_RABBITMQ_PASSWORD}
    volumes:
      - talos_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - talos_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TALOS_DB_URL: jdbc:postgresql://postgres:5432/talos
      TALOS_DB_USER: talos
      TALOS_DB_PASSWORD: ${TALOS_DB_PASSWORD}
      TALOS_RABBITMQ_URL: amqp://talos:${TALOS_RABBITMQ_PASSWORD}@rabbitmq:5672
      TALOS_REDIS_URL: redis://redis:6379
      TALOS_JWT_SECRET: ${TALOS_JWT_SECRET}
      TALOS_INTERNAL_API_TOKEN: ${TALOS_INTERNAL_API_TOKEN}
      TALOS_ADMIN_EMAIL: ${TALOS_ADMIN_EMAIL}
      TALOS_ADMIN_PASSWORD: ${TALOS_ADMIN_PASSWORD}
      TALOS_SECRETS_KEY: ${TALOS_SECRETS_KEY}
      TALOS_GITHUB_WEBHOOK_SECRET: ${TALOS_GITHUB_WEBHOOK_SECRET}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    labels:
      # Dokploy/Traefik routing -- adjust the Host() rule to your domain.
      - "traefik.enable=true"
      - "traefik.http.routers.talos-api.rule=Host(`api.talos.example.com`)"
      - "traefik.http.services.talos-api.loadbalancer.server.port=8080"

  runner-supervisor:
    build:
      context: ../..
      dockerfile: apps/runner-supervisor/Dockerfile
    restart: unless-stopped
    environment:
      TALOS_WORKSPACES_ROOT: /var/talos/workspaces
      TALOS_PROVIDER_HOMES_ROOT: /var/talos/provider-homes
      TALOS_INTERNAL_API_TOKEN: ${TALOS_INTERNAL_API_TOKEN}
      TALOS_MAX_WORKSPACE_AGE_DAYS: "7"
      # Phase 11 (Section 8): per-run `docker run` containers -- volume/network names must match the
      # `name:` fields declared below so they resolve regardless of this file's compose project name.
      TALOS_RUN_WORKSPACES_VOLUME: talos_workspaces
      TALOS_RUN_PROVIDER_HOMES_VOLUME: talos_provider_homes
      TALOS_RUN_NETWORK: talos_run_network
      TALOS_RUN_MEMORY_LIMIT: ${TALOS_RUN_MEMORY_LIMIT:-1g}
      TALOS_RUN_CPU_LIMIT: ${TALOS_RUN_CPU_LIMIT:-1}
      TALOS_RUN_PIDS_LIMIT: ${TALOS_RUN_PIDS_LIMIT:-256}
    volumes:
      - talos_workspaces:/var/talos/workspaces
      - talos_provider_homes:/var/talos/provider-homes
      # Lets this container launch per-run `docker run` containers on the host daemon (decision:
      # talos-runner-supervisor keeps Docker socket access; the containers it spawns get none --
      # verified by packages/agent-adapter-spec/tests/test_container_execution.py). group_add below
      # grants the container's non-root `talos` user permission to use the socket; set
      # TALOS_DOCKER_GID to your host's `docker` group GID (`stat -c '%g' /var/run/docker.sock` or
      # `getent group docker`).
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "${TALOS_DOCKER_GID}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

  orchestrator:
    build:
      context: ../..
      dockerfile: apps/orchestrator/Dockerfile
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
      runner-supervisor:
        condition: service_healthy
    environment:
      TALOS_API_BASE_URL: http://api:8080
      TALOS_INTERNAL_API_TOKEN: ${TALOS_INTERNAL_API_TOKEN}
      TALOS_RABBITMQ_URL: amqp://talos:${TALOS_RABBITMQ_PASSWORD}@rabbitmq:5672
      TALOS_REDIS_URL: redis://redis:6379
      TALOS_RUNNER_BASE_URL: http://runner-supervisor:8081
      TALOS_MAX_ACTIVE_RUNS: "1"
      TALOS_RUN_TIMEOUT_MINUTES: "60"
    # No HTTP port: the orchestrator only consumes from RabbitMQ (Section 4.3's four paths) --
    # Dokploy's health check for this app type is process liveness, not an HTTP probe.

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      TALOS_API_URL: https://api.talos.example.com
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.talos-web.rule=Host(`talos.example.com`)"
      - "traefik.http.services.talos-web.loadbalancer.server.port=80"

volumes:
  talos_postgres_data:
  talos_rabbitmq_data:
  talos_redis_data:
  # Explicit `name:` (rather than letting Compose prefix with the project name) so
  # talos-runner-supervisor's `docker run --mount type=volume,source=talos_workspaces,...` resolves
  # the same volume Compose created here, independent of this file's project name.
  talos_workspaces:
    name: talos_workspaces
  talos_provider_homes:
    name: talos_provider_homes

networks:
  # Phase 11 (Section 8): the network every per-run `docker run` container joins instead of this
  # compose file's default network -- no route to postgres/rabbitmq/redis/api, only normal outbound
  # internet via Docker's default NAT (needed for `npm install`/`mvnw`/etc.). Declared here purely
  # for documentation: no service below attaches to it (attaching talos-runner-supervisor itself
  # would let per-run containers reach its own HTTP API), so Compose never creates or manages it --
  # talos-runner-supervisor creates it lazily via its own Docker socket access on first containerized
  # run (packages/agent-adapter-spec/src/talos_agent_adapter_spec/container.py:ensure_network).
  talos_run_network:
    name: talos_run_network
    external: true
