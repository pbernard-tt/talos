# Local development infra for Talos. Application services are added to this file as their
# implementation phases land (Section 16 of the implementation plan): talos-api since Phase 1,
# talos-web/talos-orchestrator/talos-runner-supervisor still to come.
#
# Usage: docker compose -f infra/docker-compose.dev.yml up
#
# Host ports for postgres (5433) and rabbitmq (5673/15673) are shifted from their
# defaults to avoid clashing with other services that may already be running on
# the host. Container-internal ports are untouched, so TALOS_*_URL values used by
# app services on the Docker network stay at the standard ports (5432/5672).

services:
  postgres:
    image: postgres:17
    container_name: talos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: talos
      POSTGRES_USER: talos
      POSTGRES_PASSWORD: talos
    ports:
      - "5433:5432"
    volumes:
      - talos_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talos -d talos"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:4.1-management
    container_name: talos-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: talos
      RABBITMQ_DEFAULT_PASS: talos
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - talos_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: talos-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - talos_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../apps/api
    container_name: talos-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Dev-only placeholders, committed deliberately (same spirit as the postgres/rabbitmq
      # credentials above) — never reuse these values outside local development.
      TALOS_DB_URL: jdbc:postgresql://postgres:5432/talos
      TALOS_DB_USER: talos
      TALOS_DB_PASSWORD: talos
      TALOS_RABBITMQ_URL: amqp://talos:talos@rabbitmq:5672
      TALOS_REDIS_URL: redis://redis:6379
      TALOS_JWT_SECRET: dev-only-jwt-signing-secret-do-not-use-in-production-32bytes+
      TALOS_INTERNAL_API_TOKEN: dev-only-internal-api-token-do-not-use-in-production
      TALOS_ADMIN_EMAIL: admin@talos.local
      TALOS_ADMIN_PASSWORD: talos-dev-admin
      TALOS_SECRETS_KEY: ZGV2LW9ubHktMzItYnl0ZS1wbGFjZWhvbGRlci1rZXkhISE=
      TALOS_GITHUB_WEBHOOK_SECRET: dev-only-github-webhook-secret
    ports:
      - "8080:8080"

volumes:
  talos_postgres_data:
  talos_rabbitmq_data:
  talos_redis_data:
