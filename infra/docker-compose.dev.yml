# Local development infra for Talos. Application services are added to this file as their
# implementation phases land (Section 16 of the implementation plan): talos-api since Phase 1,
# talos-orchestrator/talos-runner-supervisor since Phase 6, talos-web still to come.
#
# Usage: docker compose -f infra/docker-compose.dev.yml up
#
# Host ports for postgres (5433) and rabbitmq (5673/15673) are shifted from their
# defaults to avoid clashing with other services that may already be running on
# the host. Container-internal ports are untouched, so TALOS_*_URL values used by
# app services on the Docker network stay at the standard ports (5432/5672).

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: talos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: talos
      POSTGRES_USER: talos
      POSTGRES_PASSWORD: talos
    ports:
      - "5433:5432"
    volumes:
      - talos_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talos -d talos"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:4.1-management
    container_name: talos-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: talos
      RABBITMQ_DEFAULT_PASS: talos
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - talos_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: talos-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - talos_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: talos-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Dev-only placeholders, committed deliberately (same spirit as the postgres/rabbitmq
      # credentials above) — never reuse these values outside local development.
      TALOS_DB_URL: jdbc:postgresql://postgres:5432/talos
      TALOS_DB_USER: talos
      TALOS_DB_PASSWORD: talos
      TALOS_RABBITMQ_URL: amqp://talos:talos@rabbitmq:5672
      TALOS_REDIS_URL: redis://redis:6379
      TALOS_JWT_SECRET: dev-only-jwt-signing-secret-do-not-use-in-production-32bytes+
      TALOS_INTERNAL_API_TOKEN: dev-only-internal-api-token-do-not-use-in-production
      TALOS_ADMIN_EMAIL: admin@talos.local
      TALOS_ADMIN_PASSWORD: talos-dev-admin
      TALOS_SECRETS_KEY: ZGV2LW9ubHktMzItYnl0ZS1wbGFjZWhvbGRlci1rZXk=
      TALOS_GITHUB_WEBHOOK_SECRET: dev-only-github-webhook-secret
      # Section 16 Phase 12 Track B: seeded chat trigger service accounts. Must match the
      # telegram-adapter/whatsapp-adapter services' own TALOS_*_SERVICE_EMAIL/PASSWORD below.
      TALOS_TELEGRAM_SERVICE_EMAIL: telegram-bot@talos.local
      TALOS_TELEGRAM_SERVICE_PASSWORD: talos-dev-telegram-password
      TALOS_WHATSAPP_SERVICE_EMAIL: whatsapp-bot@talos.local
      TALOS_WHATSAPP_SERVICE_PASSWORD: talos-dev-whatsapp-password
    ports:
      - "8080:8080"

  runner-supervisor:
    build:
      context: ..
      dockerfile: apps/runner-supervisor/Dockerfile
    container_name: talos-runner-supervisor
    restart: unless-stopped
    environment:
      TALOS_WORKSPACES_ROOT: /var/talos/workspaces
      TALOS_PROVIDER_HOMES_ROOT: /var/talos/provider-homes
      # Dev-only placeholder, committed deliberately -- see the api service's comment above.
      TALOS_INTERNAL_API_TOKEN: dev-only-internal-api-token-do-not-use-in-production
      TALOS_MAX_WORKSPACE_AGE_DAYS: "7"
      # Phase 11 (Section 8): per-run `docker run` containers -- volume/network names must match the
      # `name:` fields declared below so they resolve regardless of this file's compose project name.
      TALOS_RUN_WORKSPACES_VOLUME: talos_workspaces
      TALOS_RUN_PROVIDER_HOMES_VOLUME: talos_provider_homes
      TALOS_RUN_NETWORK: talos_run_network
      TALOS_RUN_MEMORY_LIMIT: 1g
      TALOS_RUN_CPU_LIMIT: "1"
      TALOS_RUN_PIDS_LIMIT: "256"
    volumes:
      - talos_workspaces:/var/talos/workspaces
      - talos_provider_homes:/var/talos/provider-homes
      # Lets this container launch per-run `docker run` containers on the host daemon (decision:
      # talos-runner-supervisor keeps Docker socket access; the containers it spawns get none --
      # verified by packages/agent-adapter-spec/tests/test_container_execution.py). group_add below
      # grants the container's non-root `talos` user permission to use the socket; override
      # TALOS_DOCKER_GID if your host's `docker` group GID differs (check with `stat -c '%g'
      # /var/run/docker.sock` or `getent group docker`).
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "${TALOS_DOCKER_GID:-999}"
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  orchestrator:
    build:
      context: ..
      dockerfile: apps/orchestrator/Dockerfile
    container_name: talos-orchestrator
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
      runner-supervisor:
        condition: service_healthy
    environment:
      TALOS_API_BASE_URL: http://api:8080
      # Dev-only placeholder, committed deliberately -- see the api service's comment above.
      TALOS_INTERNAL_API_TOKEN: dev-only-internal-api-token-do-not-use-in-production
      TALOS_RABBITMQ_URL: amqp://talos:talos@rabbitmq:5672
      TALOS_REDIS_URL: redis://redis:6379
      TALOS_RUNNER_BASE_URL: http://runner-supervisor:8081
      TALOS_MAX_ACTIVE_RUNS: "1"
      TALOS_RUN_TIMEOUT_MINUTES: "60"

  telegram-adapter:
    build:
      context: ../apps/telegram-adapter
      dockerfile: Dockerfile
    container_name: talos-telegram-adapter
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      TALOS_API_BASE_URL: http://api:8080
      TALOS_WEB_BASE_URL: http://localhost:4200
      TALOS_RABBITMQ_URL: amqp://talos:talos@rabbitmq:5672
      TALOS_REDIS_URL: redis://redis:6379
      # Real values required to actually run this service -- see docs/deployment.md. Left blank by
      # default so `docker compose up` still succeeds without a Telegram bot configured (Section 16
      # Phase 12 Track B is optional post-MVP, not a Section 10 hard dependency).
      TALOS_TELEGRAM_BOT_TOKEN: ""
      TALOS_TELEGRAM_ALLOWED_CHAT_IDS: ""
      TALOS_TELEGRAM_SERVICE_EMAIL: telegram-bot@talos.local
      TALOS_TELEGRAM_SERVICE_PASSWORD: talos-dev-telegram-password

  whatsapp-adapter:
    build:
      context: ../apps/whatsapp-adapter
      dockerfile: Dockerfile
    container_name: talos-whatsapp-adapter
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      TALOS_API_BASE_URL: http://api:8080
      TALOS_WEB_BASE_URL: http://localhost:4200
      TALOS_RABBITMQ_URL: amqp://talos:talos@rabbitmq:5672
      TALOS_REDIS_URL: redis://redis:6379
      # Real values required to actually run this service -- see docs/deployment.md. Left blank by
      # default so `docker compose up` still succeeds without the Cloud API configured (Section 16
      # Phase 12 Track B is optional post-MVP, not a Section 10 hard dependency).
      TALOS_WHATSAPP_VERIFY_TOKEN: ""
      TALOS_WHATSAPP_APP_SECRET: ""
      TALOS_WHATSAPP_ACCESS_TOKEN: ""
      TALOS_WHATSAPP_PHONE_NUMBER_ID: ""
      TALOS_WHATSAPP_ALLOWED_IDS: ""
      TALOS_WHATSAPP_SERVICE_EMAIL: whatsapp-bot@talos.local
      TALOS_WHATSAPP_SERVICE_PASSWORD: talos-dev-whatsapp-password
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  talos_postgres_data:
  talos_rabbitmq_data:
  talos_redis_data:
  # Explicit `name:` (rather than letting Compose prefix with the project name) so
  # talos-runner-supervisor's `docker run --mount type=volume,source=talos_workspaces,...` resolves
  # the same volume Compose created here, independent of this file's project name.
  talos_workspaces:
    name: talos_workspaces
  talos_provider_homes:
    name: talos_provider_homes

networks:
  # Phase 11 (Section 8): the network every per-run `docker run` container joins instead of this
  # compose file's default network -- no route to postgres/rabbitmq/redis/api, only normal outbound
  # internet via Docker's default NAT (needed for `npm install`/`mvnw`/etc.). Declared here purely
  # for documentation: no service below attaches to it (attaching talos-runner-supervisor itself
  # would let per-run containers reach its own HTTP API), so Compose never creates or manages it --
  # talos-runner-supervisor creates it lazily via its own Docker socket access on first containerized
  # run (packages/agent-adapter-spec/src/talos_agent_adapter_spec/container.py:ensure_network).
  talos_run_network:
    name: talos_run_network
    external: true
