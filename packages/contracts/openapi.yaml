openapi: 3.1.0
info:
  title: Talos API
  description: >
    Source of truth for the talos-api public (/api/v1) and internal (/internal/v1) REST surface.
    The Angular client is generated from this file (openapi-generator, typescript-angular); CI
    diffs the running API's springdoc output against it. Endpoints are added phase by phase per
    Section 10 of the implementation plan — this file currently covers Phase 1 (auth),
    Phase 3 (project registry), Phase 4 (task board), Phase 5 (agent run lifecycle, API side),
    and Phase 6 (cancel + internal changes ingest; still no approval endpoints -- Phase 8).
  version: "0.6.0"
servers:
  - url: /api/v1
    description: "Public API (JWT via Authorization: Bearer)"
  - url: /internal/v1
    description: "Internal API (service token via X-Talos-Internal-Token)"
security:
  - bearerAuth: []
paths:
  /auth/login:
    post:
      operationId: login
      summary: Authenticate and receive a JWT.
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/Error"

  /projects:
    get:
      operationId: listProjects
      summary: List projects.
      tags: [projects]
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ProjectStatus"
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageProjectSummary"
    post:
      operationId: createProject
      summary: Register a new project.
      tags: [projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "422":
          $ref: "#/components/responses/Error"

  /projects/{id}:
    get:
      operationId: getProject
      summary: Get a project, its active config, and its 5 most recent runs.
      tags: [projects]
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDetail"
        "404":
          $ref: "#/components/responses/Error"
    put:
      operationId: updateProject
      summary: Update project fields.
      tags: [projects]
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"

  /projects/{id}/sync-config:
    post:
      operationId: syncProjectConfig
      summary: Validate and store a new talos.yaml version; deactivates the previous active version.
      tags: [projects]
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncConfigRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectConfig"
        "404":
          $ref: "#/components/responses/Error"
        "422":
          description: talos.yaml failed schema validation; error.details is a field-path -> message map.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /tasks:
    get:
      operationId: listTasks
      summary: List tasks.
      tags: [tasks]
      parameters:
        - name: projectId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/TaskStatus"
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageTaskSummary"
    post:
      operationId: createTask
      summary: Create a task in BACKLOG.
      tags: [tasks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          $ref: "#/components/responses/Error"

  /tasks/{id}:
    get:
      operationId: getTask
      summary: Get a task and its agent runs.
      tags: [tasks]
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskDetail"
        "404":
          $ref: "#/components/responses/Error"
    patch:
      operationId: patchTask
      summary: Partially update task fields (not status — use /move).
      tags: [tasks]
      parameters:
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchTaskRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          $ref: "#/components/responses/Error"

  /tasks/{id}/move:
    post:
      operationId: moveTask
      summary: Move a task to a new Kanban column and/or reorder it within one.
      tags: [tasks]
      parameters:
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveTaskRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          $ref: "#/components/responses/Error"
        "422":
          description: Illegal status transition (Section 8.2 -- RUNNING/REVIEW/DONE/BLOCKED are set only by the run state machine).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /tasks/{id}/start-run:
    post:
      operationId: startRun
      summary: Start an agent run for a task (CREATED -> QUEUED, publishes task.run.requested).
      tags: [runs]
      parameters:
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartRunRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Run"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          description: An active (non-terminal) run already exists for this task.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /runs:
    get:
      operationId: listRuns
      summary: List agent runs.
      tags: [runs]
      parameters:
        - name: projectId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RunStatus"
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageRunSummary"

  /runs/{id}:
    get:
      operationId: getRun
      summary: Get a run and its steps.
      tags: [runs]
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunDetail"
        "404":
          $ref: "#/components/responses/Error"

  /runs/{id}/logs:
    get:
      operationId: getRunLogs
      summary: Get a page of a run's logs, optionally after a given sequence number.
      tags: [runs]
      parameters:
        - $ref: "#/components/parameters/RunId"
        - name: afterSequence
          in: query
          required: false
          schema:
            type: integer
            format: int64
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 500
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageLogEntry"
        "404":
          $ref: "#/components/responses/Error"

  /runs/{id}/events/stream:
    get:
      operationId: streamRunEvents
      summary: Server-Sent Events stream of log/status/step events for a run (Section 10.3).
      tags: [runs]
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: >
            text/event-stream. Named events: log ({sequence, stream, message, timestamp}),
            status ({from, to}), step ({stepType, status}). Heartbeat comment every 15s.
            Reconnect with Last-Event-ID = last log sequence to backfill before live relay resumes.
          content:
            text/event-stream:
              schema:
                type: string

  /runs/{id}/cancel:
    post:
      operationId: cancelRun
      summary: >
        Cancel a non-terminal run (Section 8.2 cancel edge). Transitions the run to CANCELLED
        immediately and publishes run.cancel.requested so the orchestrator can kill the process
        tree for a run it is actively processing (Phase 6 extension of Section 11 -- see
        packages/contracts/events/run.cancel.requested.json).
      tags: [runs]
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Run"
        "404":
          $ref: "#/components/responses/Error"
        "422":
          description: Run is not in a cancellable state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /internal/v1/runs/{id}/status:
    post:
      operationId: internalUpdateRunStatus
      summary: Transition a run's status (validated against Section 8.2's state machine).
      tags: [internal]
      security:
        - serviceToken: []
      servers:
        - url: /internal/v1
      parameters:
        - $ref: "#/components/parameters/RunId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InternalStatusRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Run"
        "404":
          $ref: "#/components/responses/Error"
        "422":
          description: Illegal transition (Section 8.2) -- an audit event is written even on rejection.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /internal/v1/runs/{id}/steps:
    post:
      operationId: internalRecordRunStep
      summary: Record a run step's start or completion.
      tags: [internal]
      security:
        - serviceToken: []
      servers:
        - url: /internal/v1
      parameters:
        - $ref: "#/components/parameters/RunId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InternalStepRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Step"
        "404":
          $ref: "#/components/responses/Error"

  /internal/v1/runs/{id}/logs:
    post:
      operationId: internalIngestRunLogs
      summary: Ingest a batch of log lines; persists then relays to any open SSE connection via Redis.
      tags: [internal]
      security:
        - serviceToken: []
      servers:
        - url: /internal/v1
      parameters:
        - $ref: "#/components/parameters/RunId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InternalLogsRequest"
      responses:
        "204":
          description: No Content
        "404":
          $ref: "#/components/responses/Error"

  /internal/v1/runs/{id}/changes:
    post:
      operationId: internalRecordRunChanges
      summary: Record the file-level diff summary captured by the runner supervisor (Section 8.1 step 8).
      tags: [internal]
      security:
        - serviceToken: []
      servers:
        - url: /internal/v1
      parameters:
        - $ref: "#/components/parameters/RunId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InternalChangesRequest"
      responses:
        "204":
          description: No Content
        "404":
          $ref: "#/components/responses/Error"

  /internal/v1/runs/{id}/context:
    get:
      operationId: internalGetRunContext
      summary: Run + task + project + active parsed config, for orchestrator pipeline bootstrap.
      tags: [internal]
      security:
        - serviceToken: []
      servers:
        - url: /internal/v1
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunContext"
        "404":
          $ref: "#/components/responses/Error"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    serviceToken:
      type: apiKey
      in: header
      name: X-Talos-Internal-Token

  parameters:
    ProjectId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TaskId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RunId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Error:
      description: Error envelope (Section 10.1).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      description: Error envelope returned on every non-2xx response (Section 10.1).
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: SCREAMING_SNAKE error code enumerated in this spec.
            message:
              type: string
            details:
              type: object
              additionalProperties: true

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    LoginResponse:
      type: object
      required: [token, expiresAt]
      properties:
        token:
          type: string
        expiresAt:
          type: string
          format: date-time

    ProjectStatus:
      type: string
      enum: [ACTIVE, ARCHIVED]

    ProjectSummary:
      type: object
      required: [id, name, slug, repoUrl, defaultBranch, stackType, status, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        repoUrl:
          type: string
        defaultBranch:
          type: string
        stackType:
          type: string
        status:
          $ref: "#/components/schemas/ProjectStatus"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Project:
      allOf:
        - $ref: "#/components/schemas/ProjectSummary"

    ProjectConfig:
      type: object
      required: [id, projectId, configYaml, parsedJson, version, active, createdAt]
      properties:
        id:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        configYaml:
          type: string
        parsedJson:
          type: object
          additionalProperties: true
        version:
          type: integer
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time

    RunSummary:
      type: object
      required: [id, taskId, status, agentKey, createdAt]
      properties:
        id:
          type: string
          format: uuid
        taskId:
          type: string
          format: uuid
        status:
          type: string
        agentKey:
          type: string
        createdAt:
          type: string
          format: date-time

    ProjectDetail:
      allOf:
        - $ref: "#/components/schemas/ProjectSummary"
        - type: object
          required: [activeConfig, configHistory, recentRuns]
          properties:
            activeConfig:
              oneOf:
                - $ref: "#/components/schemas/ProjectConfig"
                - type: "null"
            configHistory:
              type: array
              description: Every config version for this project, newest first (Phase 3 acceptance -- version history retained and visible).
              items:
                $ref: "#/components/schemas/ProjectConfig"
            recentRuns:
              type: array
              items:
                $ref: "#/components/schemas/RunSummary"
              maxItems: 5

    CreateProjectRequest:
      type: object
      required: [name, repoUrl, stackType]
      properties:
        name:
          type: string
        repoUrl:
          type: string
        defaultBranch:
          type: string
          description: Defaults to "main" when omitted.
        stackType:
          type: string

    UpdateProjectRequest:
      type: object
      properties:
        name:
          type: string
        repoUrl:
          type: string
        defaultBranch:
          type: string
        stackType:
          type: string
        status:
          $ref: "#/components/schemas/ProjectStatus"

    SyncConfigRequest:
      type: object
      required: [configYaml]
      properties:
        configYaml:
          type: string

    PageProjectSummary:
      type: object
      required: [content, page, size, totalElements]
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/ProjectSummary"
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer

    TaskStatus:
      type: string
      enum: [BACKLOG, READY, RUNNING, REVIEW, BLOCKED, DONE, CANCELLED]

    TaskPriority:
      type: string
      enum: [LOW, MEDIUM, HIGH]

    TaskRiskLevel:
      type: string
      enum: [NORMAL, HIGH]

    TaskSummary:
      type: object
      required: [id, projectId, title, source, status, priority, riskLevel, boardPosition, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        source:
          type: string
        status:
          $ref: "#/components/schemas/TaskStatus"
        priority:
          $ref: "#/components/schemas/TaskPriority"
        riskLevel:
          $ref: "#/components/schemas/TaskRiskLevel"
        boardPosition:
          type: integer
        requestedBy:
          type: string
          format: uuid
        assignedAgentKey:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Task:
      allOf:
        - $ref: "#/components/schemas/TaskSummary"

    TaskDetail:
      allOf:
        - $ref: "#/components/schemas/TaskSummary"
        - type: object
          required: [runs]
          properties:
            runs:
              type: array
              items:
                $ref: "#/components/schemas/RunSummary"

    CreateTaskRequest:
      type: object
      required: [projectId, title]
      properties:
        projectId:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        priority:
          $ref: "#/components/schemas/TaskPriority"
        riskLevel:
          $ref: "#/components/schemas/TaskRiskLevel"

    PatchTaskRequest:
      type: object
      description: Only non-null fields are applied. Status is not patchable here -- use /move.
      properties:
        title:
          type: string
        description:
          type: string
        priority:
          $ref: "#/components/schemas/TaskPriority"
        riskLevel:
          $ref: "#/components/schemas/TaskRiskLevel"
        assignedAgentKey:
          type: string

    MoveTaskRequest:
      type: object
      required: [status, boardPosition]
      properties:
        status:
          $ref: "#/components/schemas/TaskStatus"
        boardPosition:
          type: integer

    PageTaskSummary:
      type: object
      required: [content, page, size, totalElements]
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/TaskSummary"
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer

    RunStatus:
      type: string
      enum: [CREATED, QUEUED, PREPARING_WORKSPACE, RUNNING_AGENT, RUNNING_TESTS, REVIEWING,
        WAITING_APPROVAL, APPROVED, REJECTED, COMPLETED, FAILED, CANCELLED]

    TestStatus:
      type: string
      enum: [NOT_RUN, PASSED, FAILED, ERROR]

    ReviewStatus:
      type: string
      enum: [CLEAN, RISK_FLAGGED]

    StepType:
      type: string
      enum: [WORKSPACE, AGENT, TESTS, REVIEW, PUSH, PR, DEPLOY]

    StepStatus:
      type: string
      enum: [RUNNING, COMPLETED, FAILED, SKIPPED]

    LogStream:
      type: string
      enum: [STDOUT, STDERR, SYSTEM]

    Run:
      type: object
      required: [id, taskId, projectId, status, agentKey, providerAuthMode, testStatus, reviewStatus,
        createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        taskId:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/RunStatus"
        agentKey:
          type: string
        providerAuthMode:
          type: string
        prompt:
          type: string
        branchName:
          type: string
        workspacePath:
          type: string
        summary:
          type: string
        testStatus:
          $ref: "#/components/schemas/TestStatus"
        reviewStatus:
          $ref: "#/components/schemas/ReviewStatus"
        errorMessage:
          type: string
        exitCode:
          type: integer
        timeoutAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Step:
      type: object
      required: [id, runId, stepType, status]
      properties:
        id:
          type: string
          format: uuid
        runId:
          type: string
          format: uuid
        stepType:
          $ref: "#/components/schemas/StepType"
        status:
          $ref: "#/components/schemas/StepStatus"
        summary:
          type: string
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time

    RunDetail:
      allOf:
        - $ref: "#/components/schemas/Run"
        - type: object
          required: [steps]
          properties:
            steps:
              type: array
              items:
                $ref: "#/components/schemas/Step"

    LogEntry:
      type: object
      required: [sequence, stream, message, createdAt]
      properties:
        sequence:
          type: integer
          format: int64
        stream:
          $ref: "#/components/schemas/LogStream"
        message:
          type: string
        createdAt:
          type: string
          format: date-time

    PageRunSummary:
      type: object
      required: [content, page, size, totalElements]
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/RunSummary"
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer

    PageLogEntry:
      type: object
      required: [content, page, size, totalElements]
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/LogEntry"
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer

    StartRunRequest:
      type: object
      properties:
        agentKey:
          type: string
          description: Defaults to the active talos.yaml's agents.preferred when omitted.
        authMode:
          type: string
          description: Defaults to "api_key" when omitted.

    InternalStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          $ref: "#/components/schemas/RunStatus"
        errorMessage:
          type: string
        testStatus:
          $ref: "#/components/schemas/TestStatus"
        workspacePath:
          type: string
        branchName:
          type: string
        prompt:
          type: string
        summary:
          type: string
        exitCode:
          type: integer
      description: >
        Phase 6 extension: optional fields let the orchestrator attach whichever run details it
        just produced (workspace_path/branchName after workspace prep, prompt/exitCode after agent
        execution, testStatus after the test command) to the same transition call that reports the
        status change, instead of a separate endpoint per field.

    InternalStepRequest:
      type: object
      required: [stepType, status]
      properties:
        stepType:
          $ref: "#/components/schemas/StepType"
        status:
          $ref: "#/components/schemas/StepStatus"
        summary:
          type: string

    InternalLogEntry:
      type: object
      required: [stream, sequence, message, timestamp]
      properties:
        stream:
          $ref: "#/components/schemas/LogStream"
        sequence:
          type: integer
          format: int64
        message:
          type: string
        timestamp:
          type: string
          format: date-time

    InternalLogsRequest:
      type: object
      required: [entries]
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/InternalLogEntry"

    GitChangeType:
      type: string
      enum: [ADDED, MODIFIED, DELETED, RENAMED]

    GitChange:
      type: object
      required: [filePath, changeType, additions, deletions]
      properties:
        filePath:
          type: string
        changeType:
          $ref: "#/components/schemas/GitChangeType"
        additions:
          type: integer
        deletions:
          type: integer

    InternalChangesRequest:
      type: object
      required: [files]
      properties:
        files:
          type: array
          items:
            $ref: "#/components/schemas/GitChange"
        diffArtifactRef:
          type: string
          description: >
            Path to diff.patch on the runner supervisor's local filesystem (Section 8.3). Not a
            durable API-owned reference -- no agent_runs column stores it (MinIO artifact storage
            is post-MVP per Section "Post-MVP"); recorded in the run.changes.recorded audit event
            only. Serving diff text through the API is deferred to Phase 8's Review Center.

    RunContext:
      type: object
      required: [run, task, project]
      properties:
        run:
          $ref: "#/components/schemas/Run"
        task:
          $ref: "#/components/schemas/TaskSummary"
        project:
          $ref: "#/components/schemas/ProjectSummary"
        activeConfig:
          type: object
          additionalProperties: true
          description: The active project_configs.parsed_json, or absent if the project has no active config.
