openapi: 3.1.0
info:
  title: Talos API
  description: >
    Source of truth for the talos-api public (/api/v1) and internal (/internal/v1) REST surface.
    The Angular client is generated from this file (openapi-generator, typescript-angular); CI
    diffs the running API's springdoc output against it. Endpoints are added phase by phase per
    Section 10 of the implementation plan — this file currently covers Phase 1 (auth),
    Phase 3 (project registry), Phase 4 (task board), Phase 5 (agent run lifecycle, API side),
    Phase 6 (cancel + internal changes ingest), Phase 8 (review/approval flow: diff serving and
    the approvals endpoints), Phase 9 (git push and PR workflow: integrations, the
    git-token/pull-request internal endpoints, and GET /runs/{id}/pull-request), and Phase 10
    (Dokploy integration: POST/GET /runs/{id}/deploy, GET /projects/{id}/environments, the
    approvals type filter).
  version: "0.10.0"
servers:
  - url: /api/v1
    description: "Public API (JWT via Authorization: Bearer)"
  - url: /internal/v1
    description: "Internal API (service token via X-Talos-Internal-Token)"
security:
  - bearerAuth: []
paths:
  /auth/login:
    post:
      operationId: login
      summary: Authenticate and receive a JWT.
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/Error"

  /projects:
    get:
      operationId: listProjects
      summary: List projects.
      tags: [projects]
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ProjectStatus"
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageProjectSummary"
    post:
      operationId: createProject
      summary: Register a new project.
      tags: [projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "422":
          $ref: "#/components/responses/Error"

  /projects/{id}:
    get:
      operationId: getProject
      summary: Get a project, its active config, and its 5 most recent runs.
      tags: [projects]
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDetail"
        "404":
          $ref: "#/components/responses/Error"
    put:
      operationId: updateProject
      summary: Update project fields.
      tags: [projects]
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"

  /projects/{id}/sync-config:
    post:
      operationId: syncProjectConfig
      summary: Validate and store a new talos.yaml version; deactivates the previous active version.
      tags: [projects]
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncConfigRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectConfig"
        "404":
          $ref: "#/components/responses/Error"
        "422":
          description: talos.yaml failed schema validation; error.details is a field-path -> message map.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /projects/{id}/environments:
    get:
      operationId: listProjectEnvironments
      summary: The project's deploy targets and their most recent Dokploy deployment status (Phase 10).
      tags: [projects]
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectEnvironment"
        "404":
          $ref: "#/components/responses/Error"

  /tasks:
    get:
      operationId: listTasks
      summary: List tasks.
      tags: [tasks]
      parameters:
        - name: projectId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/TaskStatus"
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageTaskSummary"
    post:
      operationId: createTask
      summary: Create a task in BACKLOG.
      tags: [tasks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          $ref: "#/components/responses/Error"

  /tasks/{id}:
    get:
      operationId: getTask
      summary: Get a task and its agent runs.
      tags: [tasks]
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskDetail"
        "404":
          $ref: "#/components/responses/Error"
    patch:
      operationId: patchTask
      summary: Partially update task fields (not status — use /move).
      tags: [tasks]
      parameters:
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchTaskRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          $ref: "#/components/responses/Error"

  /tasks/{id}/move:
    post:
      operationId: moveTask
      summary: Move a task to a new Kanban column and/or reorder it within one.
      tags: [tasks]
      parameters:
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveTaskRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          $ref: "#/components/responses/Error"
        "422":
          description: Illegal status transition (Section 8.2 -- RUNNING/REVIEW/DONE/BLOCKED are set only by the run state machine).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /tasks/{id}/start-run:
    post:
      operationId: startRun
      summary: Start an agent run for a task (CREATED -> QUEUED, publishes task.run.requested).
      tags: [runs]
      parameters:
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartRunRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Run"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          description: An active (non-terminal) run already exists for this task.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /runs:
    get:
      operationId: listRuns
      summary: List agent runs.
      tags: [runs]
      parameters:
        - name: projectId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RunStatus"
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageRunSummary"

  /runs/{id}:
    get:
      operationId: getRun
      summary: Get a run and its steps.
      tags: [runs]
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunDetail"
        "404":
          $ref: "#/components/responses/Error"

  /runs/{id}/logs:
    get:
      operationId: getRunLogs
      summary: Get a page of a run's logs, optionally after a given sequence number.
      tags: [runs]
      parameters:
        - $ref: "#/components/parameters/RunId"
        - name: afterSequence
          in: query
          required: false
          schema:
            type: integer
            format: int64
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 500
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageLogEntry"
        "404":
          $ref: "#/components/responses/Error"

  /runs/{id}/events/stream:
    get:
      operationId: streamRunEvents
      summary: Server-Sent Events stream of log/status/step events for a run (Section 10.3).
      tags: [runs]
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: >
            text/event-stream. Named events: log ({sequence, stream, message, timestamp}),
            status ({from, to}), step ({stepType, status}). Heartbeat comment every 15s.
            Reconnect with Last-Event-ID = last log sequence to backfill before live relay resumes.
          content:
            text/event-stream:
              schema:
                type: string

  /runs/{id}/cancel:
    post:
      operationId: cancelRun
      summary: >
        Cancel a non-terminal run (Section 8.2 cancel edge). Transitions the run to CANCELLED
        immediately and publishes run.cancel.requested so the orchestrator can kill the process
        tree for a run it is actively processing (Phase 6 extension of Section 11 -- see
        packages/contracts/events/run.cancel.requested.json).
      tags: [runs]
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Run"
        "404":
          $ref: "#/components/responses/Error"
        "422":
          description: Run is not in a cancellable state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /runs/{id}/diff:
    get:
      operationId: getRunDiff
      summary: >
        Get the run's changed-file summary and full unified diff text (Section 8.1 step 8; Phase 8
        Review Center). diff is null until the orchestrator's REVIEWING step has recorded it via
        /internal/v1/runs/{id}/changes.
      tags: [runs]
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Diff"
        "404":
          $ref: "#/components/responses/Error"

  /runs/{id}/pull-request:
    get:
      operationId: getRunPullRequest
      summary: >
        The PR opened for this run after approval (Phase 9). 404 until PullRequestService has
        opened one.
      tags: [runs]
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PullRequest"
        "404":
          $ref: "#/components/responses/Error"

  /runs/{id}/deploy:
    post:
      operationId: deployRun
      summary: >
        Request a deploy of a COMPLETED run's code (Phase 10). Creates a PENDING DEPLOY approval
        and does NOT call the deploy provider when approval is required (production always is,
        Section 12.2; staging follows talos.yaml's deploy.approval_required) -- this is the
        server-side enforcement behind "deploy button disabled without approval". Otherwise
        triggers immediately.
      tags: [runs]
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeployTriggerResponse"
        "404":
          $ref: "#/components/responses/Error"
        "422":
          description: "Run is not COMPLETED, or the project has no deploy: block configured."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      operationId: getRunDeployStatus
      summary: The current deploy target/status for this run's project (re-resolved from talos.yaml each call). 404 if never requested.
      tags: [runs]
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectEnvironment"
        "404":
          $ref: "#/components/responses/Error"

  /integrations:
    get:
      operationId: listIntegrations
      summary: List configured integrations (Section 10.2). Secrets are never returned.
      tags: [integrations]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Integration"
    post:
      operationId: createIntegration
      summary: Configure an integration (e.g. a GitHub PAT) -- the secret is encrypted and stored behind a secret_ref (Section 12.2).
      tags: [integrations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntegrationCreateRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Integration"

  /integrations/{id}/test:
    post:
      operationId: testIntegration
      summary: Verify the stored credential works (e.g. calls GET /user against GitHub).
      tags: [integrations]
      parameters:
        - $ref: "#/components/parameters/IntegrationId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestIntegrationResponse"
        "404":
          $ref: "#/components/responses/Error"

  /approvals:
    get:
      operationId: listApprovals
      summary: List approvals (Section 10.2).
      tags: [approvals]
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ApprovalStatus"
        - name: runId
          in: query
          required: false
          description: Phase 8 addition -- lets the Review page (/review/:runId) find "the approval for this run".
          schema:
            type: string
            format: uuid
        - name: type
          in: query
          required: false
          description: >
            Phase 10 addition -- filters by approvalType ('RUN_RESULT'|'DEPLOY'). A COMPLETED run
            can have both a decided RUN_RESULT approval and a fresh PENDING DEPLOY approval under
            the same runId, so callers that want just one kind need this.
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageApproval"

  /approvals/{id}:
    get:
      operationId: getApproval
      summary: Get an approval, its run, and the diff summary.
      tags: [approvals]
      parameters:
        - $ref: "#/components/parameters/ApprovalId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalDetail"
        "404":
          $ref: "#/components/responses/Error"

  /approvals/{id}/approve:
    post:
      operationId: approveApproval
      summary: Approve a PENDING approval (Section 8.2's only path to WAITING_APPROVAL -> APPROVED).
      tags: [approvals]
      parameters:
        - $ref: "#/components/parameters/ApprovalId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Approval"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          description: Approval is already decided.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /approvals/{id}/reject:
    post:
      operationId: rejectApproval
      summary: Reject a PENDING approval; the run moves to REJECTED and the task returns to READY.
      tags: [approvals]
      parameters:
        - $ref: "#/components/parameters/ApprovalId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Approval"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          description: Approval is already decided.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /approvals/{id}/request-changes:
    post:
      operationId: requestApprovalChanges
      summary: >
        Request changes on a PENDING approval. Section 8.2 has no run status for "changes
        requested" -- the approval keeps this distinct outcome, but the run is driven through the
        REJECTED edge so the task returns to READY for rework.
      tags: [approvals]
      parameters:
        - $ref: "#/components/parameters/ApprovalId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestChangesRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Approval"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          description: Approval is already decided.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /internal/v1/runs/{id}/status:
    post:
      operationId: internalUpdateRunStatus
      summary: Transition a run's status (validated against Section 8.2's state machine).
      tags: [internal]
      security:
        - serviceToken: []
      servers:
        - url: /internal/v1
      parameters:
        - $ref: "#/components/parameters/RunId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InternalStatusRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Run"
        "404":
          $ref: "#/components/responses/Error"
        "422":
          description: >
            Illegal transition (Section 8.2) -- an audit event is written even on rejection.
            APPROVED/REJECTED are always rejected here with APPROVAL_REQUIRED_FOR_TRANSITION
            (Phase 8): those two are human-decision-only, reachable exclusively through
            /approvals/{id}/approve|reject|request-changes.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /internal/v1/runs/{id}/steps:
    post:
      operationId: internalRecordRunStep
      summary: Record a run step's start or completion.
      tags: [internal]
      security:
        - serviceToken: []
      servers:
        - url: /internal/v1
      parameters:
        - $ref: "#/components/parameters/RunId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InternalStepRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Step"
        "404":
          $ref: "#/components/responses/Error"

  /internal/v1/runs/{id}/logs:
    post:
      operationId: internalIngestRunLogs
      summary: Ingest a batch of log lines; persists then relays to any open SSE connection via Redis.
      tags: [internal]
      security:
        - serviceToken: []
      servers:
        - url: /internal/v1
      parameters:
        - $ref: "#/components/parameters/RunId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InternalLogsRequest"
      responses:
        "204":
          description: No Content
        "404":
          $ref: "#/components/responses/Error"

  /internal/v1/runs/{id}/changes:
    post:
      operationId: internalRecordRunChanges
      summary: Record the file-level diff summary captured by the runner supervisor (Section 8.1 step 8).
      tags: [internal]
      security:
        - serviceToken: []
      servers:
        - url: /internal/v1
      parameters:
        - $ref: "#/components/parameters/RunId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InternalChangesRequest"
      responses:
        "204":
          description: No Content
        "404":
          $ref: "#/components/responses/Error"

  /internal/v1/runs/{id}/context:
    get:
      operationId: internalGetRunContext
      summary: Run + task + project + active parsed config, for orchestrator pipeline bootstrap.
      tags: [internal]
      security:
        - serviceToken: []
      servers:
        - url: /internal/v1
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunContext"
        "404":
          $ref: "#/components/responses/Error"

  /internal/v1/runs/{id}/git-token:
    get:
      operationId: internalGetRunGitToken
      summary: >
        Phase 9's push credential flow: the decrypted GitHub token for this run's project, plus
        repoUrl/defaultBranch, for the runner supervisor's push step. 409 unless run.status ==
        APPROVED -- the server-side enforcement behind "unapproved run cannot push".
      tags: [internal]
      security:
        - serviceToken: []
      servers:
        - url: /internal/v1
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitTokenResponse"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          description: Run is not APPROVED.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /internal/v1/runs/{id}/pull-request:
    post:
      operationId: internalCreateRunPullRequest
      summary: >
        Called once the runner supervisor has pushed branchName: opens the PR via the GitHub REST
        API, stores the pull_requests row, publishes pr.created, and transitions the run
        APPROVED -> COMPLETED (Section 8.2).
      tags: [internal]
      security:
        - serviceToken: []
      servers:
        - url: /internal/v1
      parameters:
        - $ref: "#/components/parameters/RunId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InternalPullRequestRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PullRequest"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          description: Run is not APPROVED.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    serviceToken:
      type: apiKey
      in: header
      name: X-Talos-Internal-Token

  parameters:
    ProjectId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TaskId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RunId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ApprovalId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    IntegrationId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Error:
      description: Error envelope (Section 10.1).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      description: Error envelope returned on every non-2xx response (Section 10.1).
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: SCREAMING_SNAKE error code enumerated in this spec.
            message:
              type: string
            details:
              type: object
              additionalProperties: true

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    LoginResponse:
      type: object
      required: [token, expiresAt]
      properties:
        token:
          type: string
        expiresAt:
          type: string
          format: date-time

    ProjectStatus:
      type: string
      enum: [ACTIVE, ARCHIVED]

    ProjectSummary:
      type: object
      required: [id, name, slug, repoUrl, defaultBranch, stackType, status, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        repoUrl:
          type: string
        defaultBranch:
          type: string
        stackType:
          type: string
        status:
          $ref: "#/components/schemas/ProjectStatus"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Project:
      allOf:
        - $ref: "#/components/schemas/ProjectSummary"

    ProjectConfig:
      type: object
      required: [id, projectId, configYaml, parsedJson, version, active, createdAt]
      properties:
        id:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        configYaml:
          type: string
        parsedJson:
          type: object
          additionalProperties: true
        version:
          type: integer
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time

    RunSummary:
      type: object
      required: [id, taskId, status, agentKey, createdAt]
      properties:
        id:
          type: string
          format: uuid
        taskId:
          type: string
          format: uuid
        status:
          type: string
        agentKey:
          type: string
        createdAt:
          type: string
          format: date-time

    ProjectDetail:
      allOf:
        - $ref: "#/components/schemas/ProjectSummary"
        - type: object
          required: [activeConfig, configHistory, recentRuns]
          properties:
            activeConfig:
              oneOf:
                - $ref: "#/components/schemas/ProjectConfig"
                - type: "null"
            configHistory:
              type: array
              description: Every config version for this project, newest first (Phase 3 acceptance -- version history retained and visible).
              items:
                $ref: "#/components/schemas/ProjectConfig"
            recentRuns:
              type: array
              items:
                $ref: "#/components/schemas/RunSummary"
              maxItems: 5

    CreateProjectRequest:
      type: object
      required: [name, repoUrl, stackType]
      properties:
        name:
          type: string
        repoUrl:
          type: string
        defaultBranch:
          type: string
          description: Defaults to "main" when omitted.
        stackType:
          type: string

    UpdateProjectRequest:
      type: object
      properties:
        name:
          type: string
        repoUrl:
          type: string
        defaultBranch:
          type: string
        stackType:
          type: string
        status:
          $ref: "#/components/schemas/ProjectStatus"

    SyncConfigRequest:
      type: object
      required: [configYaml]
      properties:
        configYaml:
          type: string

    PageProjectSummary:
      type: object
      required: [content, page, size, totalElements]
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/ProjectSummary"
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer

    TaskStatus:
      type: string
      enum: [BACKLOG, READY, RUNNING, REVIEW, BLOCKED, DONE, CANCELLED]

    TaskPriority:
      type: string
      enum: [LOW, MEDIUM, HIGH]

    TaskRiskLevel:
      type: string
      enum: [NORMAL, HIGH]

    TaskSummary:
      type: object
      required: [id, projectId, title, source, status, priority, riskLevel, boardPosition, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        source:
          type: string
        status:
          $ref: "#/components/schemas/TaskStatus"
        priority:
          $ref: "#/components/schemas/TaskPriority"
        riskLevel:
          $ref: "#/components/schemas/TaskRiskLevel"
        boardPosition:
          type: integer
        requestedBy:
          type: string
          format: uuid
        assignedAgentKey:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Task:
      allOf:
        - $ref: "#/components/schemas/TaskSummary"

    TaskDetail:
      allOf:
        - $ref: "#/components/schemas/TaskSummary"
        - type: object
          required: [runs]
          properties:
            runs:
              type: array
              items:
                $ref: "#/components/schemas/RunSummary"

    CreateTaskRequest:
      type: object
      required: [projectId, title]
      properties:
        projectId:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        priority:
          $ref: "#/components/schemas/TaskPriority"
        riskLevel:
          $ref: "#/components/schemas/TaskRiskLevel"

    PatchTaskRequest:
      type: object
      description: Only non-null fields are applied. Status is not patchable here -- use /move.
      properties:
        title:
          type: string
        description:
          type: string
        priority:
          $ref: "#/components/schemas/TaskPriority"
        riskLevel:
          $ref: "#/components/schemas/TaskRiskLevel"
        assignedAgentKey:
          type: string

    MoveTaskRequest:
      type: object
      required: [status, boardPosition]
      properties:
        status:
          $ref: "#/components/schemas/TaskStatus"
        boardPosition:
          type: integer

    PageTaskSummary:
      type: object
      required: [content, page, size, totalElements]
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/TaskSummary"
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer

    RunStatus:
      type: string
      enum: [CREATED, QUEUED, PREPARING_WORKSPACE, RUNNING_AGENT, RUNNING_TESTS, REVIEWING,
        WAITING_APPROVAL, APPROVED, REJECTED, COMPLETED, FAILED, CANCELLED]

    TestStatus:
      type: string
      enum: [NOT_RUN, PASSED, FAILED, ERROR]

    ReviewStatus:
      type: string
      enum: [CLEAN, RISK_FLAGGED]

    StepType:
      type: string
      enum: [WORKSPACE, AGENT, TESTS, REVIEW, PUSH, PR, DEPLOY]

    StepStatus:
      type: string
      enum: [RUNNING, COMPLETED, FAILED, SKIPPED]

    LogStream:
      type: string
      enum: [STDOUT, STDERR, SYSTEM]

    Run:
      type: object
      required: [id, taskId, projectId, status, agentKey, providerAuthMode, testStatus, reviewStatus,
        createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        taskId:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/RunStatus"
        agentKey:
          type: string
        providerAuthMode:
          type: string
        prompt:
          type: string
        branchName:
          type: string
        workspacePath:
          type: string
        summary:
          type: string
        testStatus:
          $ref: "#/components/schemas/TestStatus"
        reviewStatus:
          $ref: "#/components/schemas/ReviewStatus"
        errorMessage:
          type: string
        exitCode:
          type: integer
        timeoutAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Step:
      type: object
      required: [id, runId, stepType, status]
      properties:
        id:
          type: string
          format: uuid
        runId:
          type: string
          format: uuid
        stepType:
          $ref: "#/components/schemas/StepType"
        status:
          $ref: "#/components/schemas/StepStatus"
        summary:
          type: string
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time

    RunDetail:
      allOf:
        - $ref: "#/components/schemas/Run"
        - type: object
          required: [steps]
          properties:
            steps:
              type: array
              items:
                $ref: "#/components/schemas/Step"

    LogEntry:
      type: object
      required: [sequence, stream, message, createdAt]
      properties:
        sequence:
          type: integer
          format: int64
        stream:
          $ref: "#/components/schemas/LogStream"
        message:
          type: string
        createdAt:
          type: string
          format: date-time

    PageRunSummary:
      type: object
      required: [content, page, size, totalElements]
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/RunSummary"
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer

    PageLogEntry:
      type: object
      required: [content, page, size, totalElements]
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/LogEntry"
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer

    StartRunRequest:
      type: object
      properties:
        agentKey:
          type: string
          description: Defaults to the active talos.yaml's agents.preferred when omitted.
        authMode:
          type: string
          description: Defaults to "api_key" when omitted.

    InternalStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          $ref: "#/components/schemas/RunStatus"
        errorMessage:
          type: string
        testStatus:
          $ref: "#/components/schemas/TestStatus"
        workspacePath:
          type: string
        branchName:
          type: string
        prompt:
          type: string
        summary:
          type: string
        exitCode:
          type: integer
      description: >
        Phase 6 extension: optional fields let the orchestrator attach whichever run details it
        just produced (workspace_path/branchName after workspace prep, prompt/exitCode after agent
        execution, testStatus after the test command) to the same transition call that reports the
        status change, instead of a separate endpoint per field.

    InternalStepRequest:
      type: object
      required: [stepType, status]
      properties:
        stepType:
          $ref: "#/components/schemas/StepType"
        status:
          $ref: "#/components/schemas/StepStatus"
        summary:
          type: string

    InternalLogEntry:
      type: object
      required: [stream, sequence, message, timestamp]
      properties:
        stream:
          $ref: "#/components/schemas/LogStream"
        sequence:
          type: integer
          format: int64
        message:
          type: string
        timestamp:
          type: string
          format: date-time

    InternalLogsRequest:
      type: object
      required: [entries]
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/InternalLogEntry"

    GitChangeType:
      type: string
      enum: [ADDED, MODIFIED, DELETED, RENAMED]

    GitChange:
      type: object
      required: [filePath, changeType, additions, deletions]
      properties:
        filePath:
          type: string
        changeType:
          $ref: "#/components/schemas/GitChangeType"
        additions:
          type: integer
        deletions:
          type: integer

    GitChangeSummary:
      description: >
        Output-only counterpart to GitChange (Phase 8): adds the Section 12.1 post-run policy scan
        result, shown in the Review Center's file list and risk panel.
      allOf:
        - $ref: "#/components/schemas/GitChange"
        - type: object
          required: [riskFlagged]
          properties:
            riskFlagged:
              type: boolean
            matchedPattern:
              type: string
              description: The policy.yaml/talos.yaml pattern that flagged this file, if any.

    InternalChangesRequest:
      type: object
      required: [files]
      properties:
        files:
          type: array
          items:
            $ref: "#/components/schemas/GitChange"
        diffArtifactRef:
          type: string
          description: >
            Path to diff.patch on the runner supervisor's local filesystem (Section 8.3). Not a
            durable API-owned reference -- no agent_runs column stores it (MinIO artifact storage
            is post-MVP); recorded in the run.changes.recorded audit event only.
        diffPatch:
          type: string
          description: >
            Phase 8: the full unified diff text (already computed by the runner supervisor),
            persisted onto agent_runs.diff_patch and served back via GET /runs/{id}/diff.

    Diff:
      type: object
      required: [files]
      properties:
        files:
          type: array
          items:
            $ref: "#/components/schemas/GitChangeSummary"
        diff:
          type: string
          description: Unified diff text, or null if the run hasn't reached REVIEWING yet.

    ApprovalStatus:
      type: string
      enum: [PENDING, APPROVED, REJECTED, CHANGES_REQUESTED, EXPIRED]

    Approval:
      type: object
      required: [id, taskId, runId, approvalType, requestedAction, status, createdAt]
      properties:
        id:
          type: string
          format: uuid
        taskId:
          type: string
          format: uuid
        runId:
          type: string
          format: uuid
        approvalType:
          type: string
        requestedAction:
          type: string
        status:
          $ref: "#/components/schemas/ApprovalStatus"
        requestedBy:
          type: string
          format: uuid
        approvedBy:
          type: string
          format: uuid
        approvedAt:
          type: string
          format: date-time
        notes:
          type: string
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        environment:
          type: string
          description: Phase 10 -- set only on DEPLOY-type approvals; which environment this approval gates.

    ApprovalDetail:
      type: object
      required: [approval, run, changes]
      properties:
        approval:
          $ref: "#/components/schemas/Approval"
        run:
          $ref: "#/components/schemas/Run"
        changes:
          type: array
          items:
            $ref: "#/components/schemas/GitChangeSummary"

    ApproveRequest:
      type: object
      properties:
        notes:
          type: string

    RejectRequest:
      type: object
      required: [notes]
      properties:
        notes:
          type: string

    RequestChangesRequest:
      type: object
      required: [notes]
      properties:
        notes:
          type: string

    PageApproval:
      type: object
      required: [content, page, size, totalElements]
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/Approval"
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer

    RunContext:
      type: object
      required: [run, task, project]
      properties:
        run:
          $ref: "#/components/schemas/Run"
        task:
          $ref: "#/components/schemas/TaskSummary"
        project:
          $ref: "#/components/schemas/ProjectSummary"
        activeConfig:
          type: object
          additionalProperties: true
          description: The active project_configs.parsed_json, or absent if the project has no active config.

    Integration:
      type: object
      description: Section 10.2 -- secrets are never included (they live behind SecretValue, referenced only by secret_ref).
      required: [id, type, name, enabled, createdAt]
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          description: "'github', 'dokploy', 'anthropic', ..."
        name:
          type: string
        configJson:
          type: object
          additionalProperties: true
        enabled:
          type: boolean
        createdAt:
          type: string
          format: date-time

    IntegrationCreateRequest:
      type: object
      required: [type, name]
      properties:
        type:
          type: string
        name:
          type: string
        configJson:
          type: object
          additionalProperties: true
        secret:
          type: string
          description: Plaintext credential (e.g. a GitHub fine-grained PAT); encrypted at rest and never echoed back.
        authMode:
          type: string
          description: "'pat', 'deploy_key', ... (integration_credentials.auth_mode, Section 9.2)"

    TestIntegrationResponse:
      type: object
      required: [ok, message]
      properties:
        ok:
          type: boolean
        message:
          type: string

    PullRequestStatus:
      type: string
      enum: [OPEN, MERGED, CLOSED]

    PullRequest:
      type: object
      required: [id, runId, provider, status, createdAt]
      properties:
        id:
          type: string
          format: uuid
        runId:
          type: string
          format: uuid
        provider:
          type: string
        prNumber:
          type: integer
        url:
          type: string
        status:
          $ref: "#/components/schemas/PullRequestStatus"
        createdAt:
          type: string
          format: date-time

    GitTokenResponse:
      type: object
      description: Internal-only (Section 10.4) -- never reachable from /api/v1/**.
      required: [token, authMode, repoUrl, defaultBranch]
      properties:
        token:
          type: string
        authMode:
          type: string
        repoUrl:
          type: string
        defaultBranch:
          type: string

    InternalPullRequestRequest:
      type: object
      required: [branchName, commitSha]
      properties:
        branchName:
          type: string
        commitSha:
          type: string

    DeployStatus:
      type: string
      enum: [RUNNING, SUCCEEDED, FAILED]

    ProjectEnvironment:
      type: object
      description: "Phase 10 -- a project's deploy target, synced from talos.yaml's deploy: block each time a deploy is requested."
      required: [id, projectId, environment, provider, appId, approvalRequired]
      properties:
        id:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        environment:
          type: string
        provider:
          type: string
        appId:
          type: string
        approvalRequired:
          type: boolean
        lastDeployStatus:
          $ref: "#/components/schemas/DeployStatus"
        lastDeployedAt:
          type: string
          format: date-time
        lastRunId:
          type: string
          format: uuid

    DeployTriggerResponse:
      type: object
      description: POST /runs/{id}/deploy's response -- discriminated on approvalRequired; approval is present only when true.
      required: [approvalRequired, environment]
      properties:
        approvalRequired:
          type: boolean
        approval:
          $ref: "#/components/schemas/Approval"
        environment:
          $ref: "#/components/schemas/ProjectEnvironment"
