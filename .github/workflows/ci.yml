name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  naming-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: grep -ri agentos . must return nothing (outside docs, which discuss the rule itself)
        run: |
          if grep -ri agentos . --exclude-dir=.git --exclude-dir=docs --exclude-dir=.github; then
            echo "Found forbidden legacy naming (agentos)"; exit 1
          fi

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npx ng test --watch=false

  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew --no-daemon build

  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [packages/agent-adapter-spec, apps/orchestrator, apps/runner-supervisor]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.28"
      - working-directory: ${{ matrix.project }}
        run: |
          uv sync
          uv run pytest

  docker-build:
    runs-on: ubuntu-latest
    needs: [web, api, python]
    strategy:
      matrix:
        include:
          - name: talos-web
            dockerfile: apps/web/Dockerfile
            context: apps/web
          - name: talos-api
            dockerfile: apps/api/Dockerfile
            context: apps/api
          - name: talos-orchestrator
            dockerfile: apps/orchestrator/Dockerfile
            context: .
          - name: talos-runner-supervisor
            dockerfile: apps/runner-supervisor/Dockerfile
            context: .
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.name }}
        run: docker build -f ${{ matrix.dockerfile }} -t ${{ matrix.name }}:ci ${{ matrix.context }}
